services:

  http-server-projeto-korp:

    build: .
    expose:
      - "8080"
    networks:
      - korp-network

  nginx:

    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - http-server-projeto-korp
    networks:
      - korp-network


  prometheus:

    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - korp-network

  grafana:

    image: grafana/grafana

    ports:
      - "3000:3000"

    volumes:

      - ./grafana/provisioning:/etc/grafana/provisioning

      - ./grafana/dashboards:/var/lib/grafana/dashboards

    networks:
      - korp-network
networks:

  korp-network:
    driver: bridge